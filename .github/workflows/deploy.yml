name: Deploy to cPanel (FTP)

on:
  push:
    branches:
      - main # Jalankan otomatis jika ada update di branch 'main'
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo
      
      - name: 📦 Install PHP Dependencies (Composer)
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install NPM Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          security: loose
          # Direktori tujuan di cPanel (opsional). Kosongkan jika FTP user langsung menunjuk ke root folder aplikasi SIKAP.
          # server-dir: /public_html/
          
          # Pengecualian file/folder yang TIDAK boleh ditimpa atau dihapus di cPanel
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            .env
            .env.example
            storage/**
            bootstrap/cache/**
            tests/**
            phpunit.xml
            **/*.zip
